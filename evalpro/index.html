function createClient(url, key) {
  const base = { apikey: key, Authorization: "Bearer " + key, "Content-Type": "application/json", Prefer: "return=representation" };
  let tok = null, usr = null;
  function h() { const o = { ...base }; if (tok) o.Authorization = "Bearer " + tok; return o; }
  async function req(p, opts = {}) {
    const r = await fetch(url + p, { ...opts, headers: { ...h(), ...(opts.headers || {}) } });
    if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || r.statusText); }
    const t = await r.text(); return t ? JSON.parse(t) : null;
  }
  return {
    auth: {
      async signUp(e, p) { const d = await req("/auth/v1/signup", { method: "POST", body: JSON.stringify({ email: e, password: p }) }); if (d?.access_token) { tok = d.access_token; usr = d.user; } return d; },
      async signIn(e, p) { const d = await req("/auth/v1/token?grant_type=password", { method: "POST", body: JSON.stringify({ email: e, password: p }) }); if (d?.access_token) { tok = d.access_token; usr = d.user; } return d; },
      signOut() { tok = null; usr = null; },
      getUser() { return usr; },
      setSession(t, u) { tok = t; usr = u; }
    },
    from(table) {
      let method = "GET", body = null, query = "";
      const filters = [];
      const obj = {
        select(c) { query = "?select=" + (c || "*"); method = "GET"; return obj; },
        upsert(data, { onConflict } = {}) { method = "POST"; body = JSON.stringify(Array.isArray(data) ? data : [data]); const oc = onConflict ? "?on_conflict=" + onConflict : ""; return { async execute() { return req("/rest/v1/" + table + oc, { method, body, headers: { Prefer: "return=representation,resolution=merge-duplicates" } }); } }; },
        delete() { method = "DELETE"; return obj; },
        eq(c, v) { filters.push(c + "=eq." + v); return obj; },
        async execute() { let p = "/rest/v1/" + table; const f = filters.join("&"); if (method === "GET") p += query + (f ? (query ? "&" : "?") + f : ""); else p += f ? "?" + f : ""; return req(p, { method, body }); }
      };

function evalToRow(ev, uid) {
  return { id: ev.id, user_id: uid, name: ev.name, position: ev.position, eval_type: ev.evalType, school: ev.school, year: ev.year, height: ev.height, weight: ev.weight, rating: ev.rating, body_tags: [], athletic_tags: [], competitive_tags: [], trait_scores: {}, notes: ev.rawNotes || "", strengths: ev.eval || "", weaknesses: "", film: "", eval_date: ev.date, evaluator: "", updated_at: new Date().toISOString() };
}
function rowToEval(row) {
  return { id: row.id, name: row.name, position: row.position, evalType: row.eval_type, school: row.school, year: row.year, height: row.height, weight: row.weight, rating: row.rating, rawNotes: row.notes || "", eval: row.strengths || "", date: row.eval_date };
}

function RatingBadge({ rating }) {
  const r = RATING_SCALE.find(s => s.value === rating);
  if (!r) return <span style={{ color: "#555", fontSize: 11 }}>Unrated</span>;
  return <span style={{ padding: "3px 8px", fontSize: 10, background: r.bg, color: r.color, border: `1px solid ${r.color}44`, borderRadius: 4, fontWeight: 700, fontFamily: mono, textTransform: "uppercase", whiteSpace: "nowrap" }}>{r.value} — {r.label}</span>;
}

function CompactRatingPicker({ value, onChange }) {
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 4 }}>
      {RATING_SCALE.map(r => {
        const on = value === r.value;
        return <button key={r.value} onClick={() => onChange(on ? null : r.value)} style={{ padding: "8px 2px", background: on ? r.color : "#1a1a1a", border: on ? `2px solid ${r.color}` : "2px solid #222", borderRadius: 4, cursor: "pointer", textAlign: "center" }}>
          <div style={{ fontSize: 16, fontWeight: 900, color: on ? "#fff" : r.color, fontFamily: mono }}>{r.value}</div>
          <div style={{ fontSize: 8, color: on ? "#ffffffcc" : "#666", textTransform: "uppercase", marginTop: 2, fontFamily: mono, lineHeight: 1.2 }}>{r.label}</div>
        </button>;
      })}
    </div>
  );
}

  const [filterYear, setFilterYear] = useState(null);

  const [authView, setAuthView] = useState("login");
  const [syncing, setSyncing] = useState(false);

  // Check for saved session on load
  useEffect(() => {
    setEvals(loadLocal("evalpro_evals", []));
    setBoardOrder(loadLocal("evalpro_board", {}));
    try {
      const s = JSON.parse(localStorage.getItem("evalpro_session"));
      if (s?.token && s?.user) {
        supabase.auth.setSession(s.token, s.user);
        setUser(s.user);
        setView("create");
      }
    } catch {}
  }, []);

  useEffect(() => { if (user) loadFromCloud(); }, [user]);

  async function loadFromCloud() {
    setSyncing(true);
    try {
      const rows = await supabase.from("evals").select().execute();
      if (rows && rows.length > 0) {
        const cloudEvals = rows.map(rowToEval);
        const cloudIds = new Set(cloudEvals.map(e => e.id));
        const localOnly = evals.filter(e => !cloudIds.has(e.id));
        const merged = [...cloudEvals, ...localOnly];
        setEvals(merged);
        saveLocal("evalpro_evals", merged);
        for (const ev of localOnly) {
          try { await supabase.from("evals").upsert(evalToRow(ev, user.id), { onConflict: "id" }).execute(); } catch {}
        }
      }
      const orders = await supabase.from("board_orders").select().execute();
      if (orders) {
        const o = {}; orders.forEach(r => { o[r.id] = r.order_list || []; });
        setBoardOrder(o);
        saveLocal("evalpro_board", o);
      }
    } catch (e) { console.error("Cloud sync error:", e); }
    setSyncing(false);
  }

  async function handleAuth() {
    setLoginErr(""); setLoginLoading(true);
    try {
      let d;
      if (authView === "signup") {
        d = await supabase.auth.signUp(loginEmail, loginPw);
        if (d?.user && !d?.access_token) {
          setLoginErr("Check your email to confirm, then sign in.");
          setLoginLoading(false);
          return;
        }
      } else {
        d = await supabase.auth.signIn(loginEmail, loginPw);
      }
      if (d?.user && d?.access_token) {
        setUser(d.user);
        localStorage.setItem("evalpro_session", JSON.stringify({ token: d.access_token, user: d.user }));
        setLoginEmail(""); setLoginPw("");
        setView("create");
      } else {
        setLoginErr("Failed. Check your credentials.");
      }
    } catch (e) { setLoginErr(e.message || "Login failed"); }
    setLoginLoading(false);
  }

  function signOut() {
    supabase.auth.signOut();
    setUser(null); setEvals([]); setBoardOrder({});
    localStorage.removeItem("evalpro_session");
    saveLocal("evalpro_evals", []);
    saveLocal("evalpro_board", {});
  }

  function persistEvals(newEvals) {
    setEvals(newEvals);
    saveLocal("evalpro_evals", newEvals);
  }
  function persistBoard(newOrder) {
    setBoardOrder(newOrder);
    saveLocal("evalpro_board", newOrder);

  // Cloud save helpers (fire and forget — local is source of truth)
  async function cloudSaveEval(ev) {
    if (!user) return;
    try { await supabase.from("evals").upsert(evalToRow(ev, user.id), { onConflict: "id" }).execute(); } catch (e) { console.error("Cloud save error:", e); }
  }
  async function cloudDeleteEval(id) {
    if (!user) return;
    try { await supabase.from("evals").delete().eq("id", id).execute(); } catch {}
  }
  async function cloudSaveBoardOrder(key, list) {
    if (!user) return;
    try { await supabase.from("board_orders").upsert({ id: key, user_id: user.id, order_list: list, updated_at: new Date().toISOString() }, { onConflict: "id" }).execute(); } catch {}
  }

  async function generateEval() {
    if (!rawNotes.trim()) return;
    setGenerating(true);
    try {
      const result = await rewriteEval(rawNotes);
      const lines = result.split("\n");
      let meta = { name: "", position: "", school: "", year: "", height: "", weight: "", evalType: "High School" };
      let evalText = result;
      for (let i = 0; i < lines.length; i++) {
        if (lines[i].trim().startsWith("{")) {
          try { meta = JSON.parse(lines[i].trim()); evalText = lines.slice(i + 1).join("\n").trim(); break; } catch {}
        }
      }
      setPreview({ id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6), ...meta, name: playerName || meta.name, position: playerPos || meta.position, school: playerSchool || meta.school, year: playerYear || meta.year, eval: evalText, rawNotes, rating, date: new Date().toISOString().slice(0, 10) });
      setView("preview");
    } catch (e) { console.error(e); alert("Error generating eval: " + e.message); }
    setGenerating(false);
  }

  function saveEval() {
    if (!preview) return;

          </button>
        </div>

  // ═══════ PREVIEW ═══════
  if (view === "preview" && preview) {
    const r = RATING_SCALE.find(s => s.value === rating);
    return (
      <div style={{ background: "#0a0a0a", minHeight: "100vh", color: "#e0e0e0" }}>
        <div style={{ maxWidth: 700, margin: "0 auto", padding: "20px 16px" }}>
          <NavBar />
          <div style={{ background: "#111", border: "1px solid #1a1a1a", borderRadius: 8, padding: 24 }}>

              </div>

            </div>

            <div style={{ fontSize: 9, color: "#555", textTransform: "uppercase", letterSpacing: 2, fontFamily: mono, marginTop: 16, marginBottom: 8 }}>Your Raw Notes</div>
            <div style={{ fontSize: 11, color: "#666", lineHeight: 1.5, fontFamily: mono, background: "#0a0a0a", padding: 12, borderRadius: 4, border: "1px solid #1a1a1a", whiteSpace: "pre-wrap" }}>{preview.rawNotes}</div>

              <button onClick={() => { setView("create"); setPreview(null); }} style={{ padding: "10px 20px", background: "transparent", border: "1px solid #333", borderRadius: 4, color: "#888", fontSize: 12, cursor: "pointer", fontFamily: mono }}>← EDIT NOTES</button>
              <button onClick={() => { setGenerating(true); rewriteEval(rawNotes).then(result => { const lines = result.split("\n"); let evalText = result; for (let i = 0; i < lines.length; i++) { if (lines[i].trim().startsWith("{")) { try { JSON.parse(lines[i].trim()); evalText = lines.slice(i + 1).join("\n").trim(); break; } catch {} } } setPreview({ ...preview, eval: evalText }); setGenerating(false); }).catch(() => setGenerating(false)); }} disabled={generating} style={{ padding: "10px 20px", background: "transparent", border: "1px solid #D4AF37", borderRadius: 4, color: "#D4AF37", fontSize: 12, cursor: generating ? "default" : "pointer", fontFamily: mono }}>{generating ? "..." : "REGENERATE"}</button>
              <div style={{ flex: 1 }} />
              <button onClick={saveEval} style={{ padding: "10px 28px", background: "#D4AF37", border: "none", borderRadius: 4, color: "#000", fontSize: 13, fontWeight: 700, cursor: "pointer", fontFamily: mono }}>SAVE EVAL</button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ═══════ EVALS ═══════
  function startEdit(ev) {
    setEditingId(ev.id);
    setEditForm({ name: ev.name, position: ev.position, school: ev.school || "", year: ev.year || "", rawNotes: ev.rawNotes || "", eval: ev.eval || "", rating: ev.rating });
  }
  function cancelEdit() { setEditingId(null); setEditForm(null); }
  function saveEdit() {
    if (!editForm || !editingId) return;
    const updated = evals.map(e => e.id === editingId ? { ...e, name: editForm.name, position: editForm.position, school: editForm.school, year: editForm.year, rawNotes: editForm.rawNotes, eval: editForm.eval, rating: editForm.rating } : e);
    persistEvals(updated);
    const ev = updated.find(e => e.id === editingId);
    if (ev) cloudSaveEval(ev);
    setEditingId(null); setEditForm(null);
  }

  if (view === "evals") {
    const filtered = evals.filter(e => {
      if (filterPos && e.position !== filterPos) return false;
      if (filterYear && e.year !== filterYear) return false;
      if (searchText && !e.name.toLowerCase().includes(searchText.toLowerCase()) && !(e.school || "").toLowerCase().includes(searchText.toLowerCase())) return false;
      return true;
    });
    return (
      <div style={{ background: "#0a0a0a", minHeight: "100vh", color: "#e0e0e0" }}>
        <div style={{ maxWidth: 800, margin: "0 auto", padding: "20px 16px" }}>
          <NavBar />
          <div style={{ display: "flex", gap: 6, marginBottom: 16, flexWrap: "wrap" }}>
            <input value={searchText} onChange={e => setSearchText(e.target.value)} placeholder="Search..." style={{ ...inputStyle, maxWidth: 160, fontSize: 11 }} />
            <select value={filterPos || ""} onChange={e => setFilterPos(e.target.value || null)} style={{ ...inputStyle, maxWidth: 90, fontSize: 11 }}><option value="">All Pos</option>{Object.entries(POSITIONS).map(([g, ps]) => <optgroup key={g} label={g}>{ps.map(p => <option key={p} value={p}>{p}</option>)}</optgroup>)}</select>
            <select value={filterYear || ""} onChange={e => setFilterYear(e.target.value || null)} style={{ ...inputStyle, maxWidth: 100, fontSize: 11 }}><option value="">All Years</option>{allYears.map(y => <option key={y} value={y}>{y}</option>)}</select>
          </div>
          {filtered.length === 0 ? (
            <div style={{ textAlign: "center", padding: 60, color: "#444" }}><div style={{ fontSize: 40, marginBottom: 12 }}>🏈</div><div style={{ fontSize: 14 }}>{evals.length === 0 ? "No evals yet — go create one" : "No matches"}</div></div>
          ) : (
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              {filtered.map(ev => {
                const r = RATING_SCALE.find(s => s.value === ev.rating);
                const isEditing = editingId === ev.id;
                if (isEditing && editForm) {
                  return (
                    <div key={ev.id} style={{ background: "#111", border: "1px solid #D4AF3744", borderRadius: 6, padding: 16 }}>

                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8, marginBottom: 12 }}>
                        <div><div style={labelStyle}>Name</div><input value={editForm.name} onChange={e => setEditForm({ ...editForm, name: e.target.value })} style={inputStyle} /></div>
                        <div><div style={labelStyle}>Position</div><select value={editForm.position} onChange={e => setEditForm({ ...editForm, position: e.target.value })} style={inputStyle}><option value="">-- Select --</option>{Object.entries(POSITIONS).map(([g, ps]) => <optgroup key={g} label={g}>{ps.map(p => <option key={p} value={p}>{p}</option>)}</optgroup>)}</select></div>
                        <div><div style={labelStyle}>School</div><input value={editForm.school} onChange={e => setEditForm({ ...editForm, school: e.target.value })} style={inputStyle} /></div>
                        <div><div style={labelStyle}>Year</div><input value={editForm.year} onChange={e => setEditForm({ ...editForm, year: e.target.value })} style={inputStyle} /></div>
                      </div>
                      <div style={labelStyle}>Eval Text</div>
                      <textarea value={editForm.eval} onChange={e => setEditForm({ ...editForm, eval: e.target.value })} style={{ ...inputStyle, minHeight: 120, resize: "vertical", lineHeight: 1.6, marginBottom: 12 }} />
                      <div style={labelStyle}>Raw Notes</div>
                      <textarea value={editForm.rawNotes} onChange={e => setEditForm({ ...editForm, rawNotes: e.target.value })} style={{ ...inputStyle, minHeight: 80, resize: "vertical", lineHeight: 1.5, fontSize: 11, marginBottom: 12 }} />
                      <div style={labelStyle}>Grade</div>

                return (

                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: 700, fontSize: 15, color: "#fff" }}>{ev.name}</div>
                        <div style={{ fontSize: 10, color: "#666", fontFamily: mono }}>{[ev.school, ev.year, ev.height, ev.weight ? ev.weight + "lbs" : ""].filter(Boolean).join(" · ")}</div>
                      </div>
                      <RatingBadge rating={ev.rating} />
                      <button onClick={() => startEdit(ev)} style={{ width: 28, height: 28, background: "transparent", border: "1px solid #222", borderRadius: 4, color: "#D4AF3788", cursor: "pointer", fontSize: 11, fontFamily: mono }}>✎</button>

                    <div style={{ fontSize: 13, color: "#ccc", lineHeight: 1.6 }}>{ev.eval}</div>
                  </div>

        </div>

  // ═══════ BOARD ═══════
  if (view === "board") {
    const BP = ["WRO", "WRI", "CB"];

    // ── Board Index (tile grid) ──
    if (boardView === "index") {
      const tiles = [];
      BP.forEach(p => {
        const pEvals = evals.filter(e => e.position === p);
        const hs = pEvals.filter(e => e.evalType === "High School");
        const portal = pEvals.filter(e => e.evalType === "Transfer Portal");
        const years = [...new Set(hs.map(e => e.year).filter(Boolean))].sort();
        years.forEach(y => {
          const count = hs.filter(e => e.year === y).length;
          if (count > 0) tiles.push({ pos: p, year: y, type: "hs", label: `${y} ${p}s`, sub: "High School", count });
        });
        if (portal.length > 0) tiles.push({ pos: p, year: null, type: "portal", label: `${p} Transfer Portal`, sub: "Portal", count: portal.length });
      });
      return (

              <div style={{ textAlign: "center", padding: 60, color: "#444" }}><div style={{ fontSize: 40, marginBottom: 12 }}>🏈</div><div style={{ fontSize: 14 }}>No boards yet — create evals for WRO, WRI, or CB to populate boards</div></div>

              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(200px, 1fr))", gap: 12 }}>
                {tiles.map(t => (
                  <button key={t.pos + "-" + (t.year || "portal")} onClick={() => { setBoardPos(t.pos); setBoardTab(t.type === "portal" ? "portal" : "hs"); setBoardHsYear(t.type === "hs" ? t.year : null); setBoardView("detail"); setPreviewId(null); }}
                    style={{ background: "#111", border: "2px solid #222", borderRadius: 8, padding: 20, cursor: "pointer", textAlign: "left", transition: "border-color 0.15s" }}
                    onMouseOver={e => e.currentTarget.style.borderColor = "#D4AF37"} onMouseOut={e => e.currentTarget.style.borderColor = "#222"}>
                    <div style={{ fontSize: 18, fontWeight: 900, color: "#D4AF37", fontFamily: mono, marginBottom: 4 }}>{t.label}</div>
                    <div style={{ fontSize: 10, color: "#666", fontFamily: mono, textTransform: "uppercase", letterSpacing: 1, marginBottom: 8 }}>{t.sub}</div>
                    <div style={{ fontSize: 24, fontWeight: 900, color: "#fff", fontFamily: mono }}>{t.count}</div>
                    <div style={{ fontSize: 9, color: "#555", fontFamily: mono, textTransform: "uppercase" }}>prospect{t.count !== 1 ? "s" : ""}</div>
                  </button>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    // ── Board Detail ──
    const pos = boardPos || "WRO";
    const posEvals = evals.filter(e => e.position === pos);
    const hsEvals = posEvals.filter(e => e.evalType === "High School");
    const portalEvals = posEvals.filter(e => e.evalType === "Transfer Portal");
    const hsYears = [...new Set(hsEvals.map(e => e.year).filter(Boolean))].sort();

    function getOrdered(bk, src) {
      const saved = boardOrder[bk] || [];
      const ids = new Set(src.map(e => e.id));
      const ord = saved.filter(id => ids.has(id));
      const s = new Set(ord);
      src.forEach(ev => { if (!s.has(ev.id)) ord.push(ev.id); });
      return ord;
    }
    function reorder(bk, from, to) {
      const src = bk.includes("portal") ? portalEvals : hsEvals.filter(e => e.year === bk.split("-")[1]);
      const list = getOrdered(bk, src);
      const [item] = list.splice(from, 1); list.splice(to, 0, item);
      persistBoard({ ...boardOrder, [bk]: list });
      cloudSaveBoardOrder(bk, list);
    }
    const pEval = evals.find(e => e.id === previewId);

    function renderBoardList(boardKey, sourceEvals, title) {
      const ids = getOrdered(boardKey, sourceEvals);
      const ordered = ids.map(id => sourceEvals.find(e => e.id === id)).filter(Boolean);
      return (
        <div key={boardKey} style={{ marginBottom: 24 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8 }}><div style={{ fontSize: 13, fontWeight: 800, color: "#fff", fontFamily: mono }}>{title}</div><span style={{ fontSize: 10, color: "#555", fontFamily: mono }}>{ordered.length}</span></div>
          {ordered.length === 0 ? <div style={{ background: "#111", border: "1px dashed #222", borderRadius: 4, padding: 20, textAlign: "center", color: "#333", fontSize: 11, fontFamily: mono }}>No {pos}s yet</div> : (
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              {ordered.map((ev, idx) => {
                const r = RATING_SCALE.find(s => s.value === ev.rating);
                const drag = dragState && dragState.boardKey === boardKey && dragState.idx === idx;
                return (
                  <div key={ev.id} draggable onDragStart={() => setDragState({ boardKey, idx })} onDragOver={e => e.preventDefault()} onDrop={() => { if (dragState && dragState.boardKey === boardKey && dragState.idx !== idx) reorder(boardKey, dragState.idx, idx); setDragState(null); }} onDragEnd={() => setDragState(null)}
                    style={{ background: drag ? "#1a1a1a" : "#111", border: `1px solid ${drag ? "#D4AF37" : "#1a1a1a"}`, borderRadius: 4, padding: "8px 12px", display: "flex", alignItems: "center", gap: 10, cursor: "grab", opacity: drag ? 0.5 : 1 }}>
                    <div style={{ width: 28, textAlign: "center", fontSize: 14, fontWeight: 900, color: "#555", fontFamily: mono }}>{idx + 1}</div>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: r ? r.color : "#333", flexShrink: 0 }} />
                    <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={() => setPreviewId(ev.id)}>
                      <div style={{ fontWeight: 700, fontSize: 13, color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ev.name}</div>
                      <div style={{ fontSize: 9, color: "#666", fontFamily: mono }}>{[ev.school, ev.year].filter(Boolean).join(" · ")}</div>
                    </div>
                    {r && <div style={{ padding: "3px 8px", fontSize: 9, background: r.bg, color: r.color, border: `1px solid ${r.color}44`, borderRadius: 3, fontWeight: 700, fontFamily: mono, flexShrink: 0 }}>{r.value}</div>}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    return (
      <div style={{ background: "#0a0a0a", minHeight: "100vh", color: "#e0e0e0" }}>
        <div style={{ maxWidth: 900, margin: "0 auto", padding: "20px 16px" }}>
          <NavBar />
          <div style={{ display: "flex", gap: 6, marginBottom: 16, alignItems: "center", flexWrap: "wrap" }}>
            <button onClick={() => { setBoardView("index"); setPreviewId(null); }} style={{ padding: "6px 14px", fontSize: 10, fontFamily: mono, background: "transparent", border: "1px solid #333", borderRadius: 4, color: "#888", cursor: "pointer" }}>&larr; ALL BOARDS</button>
            <div style={{ flex: 1 }} />
            <div style={{ fontSize: 16, fontWeight: 900, color: "#D4AF37", fontFamily: mono, letterSpacing: 2 }}>{pos} {boardTab === "portal" ? "PORTAL" : boardHsYear ? `CLASS OF ${boardHsYear}` : "ALL YEARS"}</div>
          </div>
          <div style={{ display: "flex", gap: 16 }}>
            <div style={{ flex: 1, minWidth: 0 }}>
              {boardTab === "hs" ? (
                hsYears.length === 0 ? <div style={{ textAlign: "center", padding: 60, color: "#444", fontFamily: mono, fontSize: 14 }}>No HS {pos} evals yet</div>
                  : (boardHsYear ? hsYears.filter(y => y === boardHsYear) : hsYears).map(year =>
                    renderBoardList(`${pos}-${year}-hs`, hsEvals.filter(e => e.year === year), `Class of ${year}`)
                  )
              ) : renderBoardList(`${pos}-portal`, portalEvals, `${pos} Transfer Portal Board`)}
            </div>
            {pEval && (
              <div style={{ width: 320, flexShrink: 0, background: "#111", border: "1px solid #1a1a1a", borderRadius: 6, padding: 16, position: "sticky", top: 20, maxHeight: "calc(100vh - 40px)", overflowY: "auto" }}>
                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12 }}><span style={{ fontSize: 9, color: "#555", textTransform: "uppercase", letterSpacing: 1, fontFamily: mono }}>Preview</span><button onClick={() => setPreviewId(null)} style={{ background: "transparent", border: "none", color: "#555", cursor: "pointer", fontSize: 14 }}>✕</button></div>
                <div style={{ fontSize: 18, fontWeight: 800, color: "#fff", marginBottom: 4 }}>{pEval.name}</div>
                <div style={{ fontSize: 10, color: "#888", fontFamily: mono, marginBottom: 8 }}>{[pEval.position, pEval.school, pEval.year, pEval.height, pEval.weight ? pEval.weight + "lbs" : ""].filter(Boolean).join(" · ")}</div>
                <div style={{ marginBottom: 12 }}><RatingBadge rating={pEval.rating} /></div>
                <div style={{ fontSize: 9, color: "#D4AF37", textTransform: "uppercase", letterSpacing: 2, fontFamily: mono, marginBottom: 6 }}>Evaluation</div>
                <div style={{ fontSize: 13, color: "#ccc", lineHeight: 1.6 }}>{pEval.eval}</div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
